version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: queuectl_user
      POSTGRES_PASSWORD: queuectl_password
      POSTGRES_DB: queuectl_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U queuectl_user -d queuectl_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://queuectl_user:queuectl_password@postgres:5432/queuectl_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      bash -c "alembic upgrade head && python -m app.cli.app dashboard start --port 8000"

  worker:
    build: .
    environment:
      - DATABASE_URL=postgresql://queuectl_user:queuectl_password@postgres:5432/queuectl_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      dashboard:
        condition: service_started
    command: ["python", "-m", "app.cli.worker", "start", "--count", "3"]

volumes:
  postgres_data:
  redis_data:
